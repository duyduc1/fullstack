name: NestJS Item API CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'nest-task-ecs/nest-order-api/**'
  pull_request:
    branches:
      - main
    paths:
      - 'nest-task-ecs/nest-order-api/**'

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./nest-task-ecs/nest-order-api

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: nest-task-ecs/nest-order-api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build NestJS
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nest-order-api-build
          path: nest-task-ecs/nest-order-api/dist/
          retention-days: 1

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy lên server qua SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            echo "Pull code mới nhất"
            cd ${{ secrets.SSH_PATH }}
            git pull origin main

            echo "Cài dependencies"
            cd nest-task-ecs/nest-order-api
            npm ci
            npm audit fix --force
            npm run build
            nohup npm start > app.log 2>&1 &
            echo "Deploy thành công!"

  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./nest-task-ecs/nest-order-api

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: nest-task-ecs/nest-order-api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test
        continue-on-error: true